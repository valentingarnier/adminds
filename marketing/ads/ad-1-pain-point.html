<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Adminds Ad 1 — Pain Point</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #FAFAF9;
    display: flex;
    flex-direction: column;
    padding: 56px 64px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: auto;
  }

  .logo {
    font-family: 'Instrument Serif', Georgia, serif;
    font-style: italic;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  .logo .ad { color: #000; }
  .logo .minds { color: #6849a0; }

  .tag {
    padding: 7px 14px;
    background: white;
    border: 1px solid #e4e4e7;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    color: #71717a;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin: auto 0;
  }

  .stat-row {
    display: flex;
    gap: 36px;
    margin-bottom: 44px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 56px;
    color: #6849a0;
    line-height: 1;
    letter-spacing: -2px;
  }

  .stat-label {
    font-size: 13px;
    color: #a1a1aa;
    font-weight: 500;
  }

  .stat-divider {
    width: 1px;
    background: #e4e4e7;
    align-self: stretch;
  }

  .headline {
    font-family: 'DM Serif Display', serif;
    font-size: 54px;
    color: #18181b;
    line-height: 1.12;
    letter-spacing: -1px;
    margin-bottom: 16px;
    max-width: 750px;
  }

  .headline .muted { color: #a1a1aa; }

  .subtitle {
    font-size: 18px;
    color: #71717a;
    line-height: 1.5;
    max-width: 580px;
  }

  .bottom {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #18181b;
    color: white;
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .url {
    font-size: 13px;
    color: #a1a1aa;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <div class="logo"><span class="ad">ad</span><span class="minds">minds</span></div>
    <div class="tag">Pour psychiatres</div>
  </div>

  <div class="center">
    <div class="stat-row">
      <div class="stat">
        <div class="stat-value">2–3h</div>
        <div class="stat-label">par rapport d'assurance invalidité</div>
      </div>
    </div>

    <h1 class="headline">
      Vous aussi, vous passez trop de temps <span class="muted">sur l'administratif ?</span>
    </h1>
    <p class="subtitle">
      Nous construisons un outil pour les psychiatres. Parlez-nous de votre quotidien — 20 minutes suffisent.
    </p>
  </div>

  <div class="bottom">
    <div class="cta">Réserver un appel →</div>
    <div class="url">adminds.ch</div>
  </div>
</div>
</body>
</html>
